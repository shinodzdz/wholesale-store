<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تعديل محل - {{ shop_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:linear-gradient(rgba(11,14,20,0.82),rgba(26,31,46,0.88)),url('https://images.unsplash.com/photo-1768176136613-96a7bfc0049e?fm=jpg&q=60&w=1920');--topbar-bg:rgba(11,14,20,0.55);--card-bg:rgba(22,27,34,0.8);--card-border:rgba(255,255,255,0.04);--text:#fff;--text-muted:#8B949E;--text-dim:#484F58;--accent:#58A6FF;--accent-green:#2EA043;--accent-red:#DA3633;--btn-bg:rgba(48,54,61,0.5);--btn-hover:rgba(88,166,255,0.15);--input-bg:rgba(13,17,23,0.8);--input-border:rgba(48,54,61,0.5);--border:rgba(255,255,255,0.08);--shadow:0 25px 60px rgba(0,0,0,0.5)}
[data-theme="light"]{--bg:linear-gradient(rgba(255,255,255,0.88),rgba(240,244,248,0.92)),url('https://images.unsplash.com/photo-1768176136613-96a7bfc0049e?fm=jpg&q=60&w=1920');--topbar-bg:rgba(255,255,255,0.7);--card-bg:rgba(255,255,255,0.92);--card-border:rgba(0,0,0,0.06);--text:#1a1f2e;--text-muted:#57606a;--text-dim:#8B949E;--accent:#1F6FEB;--accent-green:#1a7f37;--accent-red:#cf222e;--btn-bg:rgba(0,0,0,0.06);--btn-hover:rgba(31,111,235,0.1);--input-bg:rgba(255,255,255,0.9);--input-border:rgba(0,0,0,0.15);--border:rgba(0,0,0,0.08);--shadow:0 25px 60px rgba(0,0,0,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
/* info */
.info-btn{position:fixed;bottom:16px;left:16px;z-index:999;width:36px;height:36px;border-radius:50%;background:var(--topbar-bg);backdrop-filter:blur(8px);border:1px solid var(--border);color:var(--text-muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.info-btn:hover{color:var(--accent);border-color:var(--accent);transform:scale(1.08)}
.info-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.info-modal.show{display:flex}
.info-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:28px 30px;width:340px;max-width:90%;text-align:center;box-shadow:var(--shadow)}
.info-card h3{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:14px}
.info-card p{font-size:14px;color:var(--text);margin:6px 0;line-height:1.6}
.info-card .muted{color:var(--text-muted);font-size:12px;margin-top:12px}
.info-close{margin-top:16px;padding:10px 28px;background:var(--btn-bg);border:none;border-radius:10px;color:var(--text);font-size:13px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all 0.2s}
.info-close:hover{background:var(--btn-hover)}
body{font-family:'Cairo',sans-serif;background:var(--bg);background-size:cover;background-position:center;background-attachment:fixed;color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s}
.topbar{background:var(--topbar-bg);backdrop-filter:blur(12px);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;transition:background 0.3s}
.topbar h1{font-size:17px;font-weight:700}
.topbar h1 span{color:var(--accent)}
.topbar a{color:var(--text-muted);text-decoration:none;font-size:13px;margin-right:12px}
.topbar a:hover{color:var(--accent)}
.theme-btn{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:6px;border-radius:10px;transition:all 0.2s;margin-right:12px}
.theme-btn:hover{background:var(--btn-hover);color:var(--accent)}
.container{display:flex;align-items:center;justify-content:center;padding:40px 20px;min-height:calc(100vh - 60px)}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:30px;width:420px;max-width:90%;transition:background 0.3s}
.card h2{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center;color:var(--accent)}
label{display:block;color:var(--text-muted);font-size:13px;margin-bottom:4px;margin-top:12px}
input{width:100%;padding:11px 14px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;box-sizing:border-box;transition:all 0.2s}
input:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:10px;margin-top:22px}
.btn-save{flex:1;padding:12px;background:linear-gradient(135deg,#238636,#2EA043);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-save:hover{transform:translateY(-1px)}
.btn-back{flex:1;padding:12px;background:rgba(48,54,61,0.5);border:none;border-radius:10px;color:var(--text-muted);font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;transition:all 0.2s}
.btn-back:hover{background:rgba(48,54,61,0.7)}
.code-display{background:var(--input-bg);padding:10px;border-radius:8px;text-align:center;font-family:monospace;color:var(--accent);font-size:18px;letter-spacing:3px;margin-top:4px}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <a href="{{ url_for('admin') }}">الرئيسية</a>
    <a href="{{ url_for('manage_products') }}">المنتجات</a>
    <a href="{{ url_for('manage_stock') }}" style="color:var(--accent-green)">المخزون</a>
    <a href="{{ url_for('manage_shops') }}">المحلات</a>
    <a href="{{ url_for('view_orders') }}">الطلبات</a>
    <a href="{{ url_for('admin_logout') }}" style="color:var(--accent-red)">خروج</a>
  </div>
  <div style="display:flex;align-items:center">
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="تغيير الثيم">🌙</button>
    <h1><span>{{ shop_name }}</span></h1>
  </div>
</div>
<div class="container">
  <div class="card">
    <h2>✏️ تعديل {{ shop.name }}</h2>
    <form method="POST">
      <label>اسم المحل</label>
      <input type="text" name="name" value="{{ shop.name }}" required>
      <label>رقم الهاتف</label>
      <input type="text" name="phone" value="{{ shop.phone or '' }}">
      <label>العنوان</label>
      <input type="text" name="address" value="{{ shop.address or '' }}">
      <label>كود المحل (للإطلاع فقط)</label>
      <div class="code-display">{{ shop.code }}</div>
      <div class="btn-row">
        <a href="{{ url_for('manage_shops') }}" class="btn-back">رجوع</a>
        <button type="submit" class="btn-save">حفظ التعديلات</button>
      </div>
    </form>
  </div>
</div>
<script>
(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️'})();
function toggleTheme(){var r=document.documentElement,n=r.getAttribute('data-theme')==='dark'?'light':'dark';r.setAttribute('data-theme',n);localStorage.setItem('theme',n);document.getElementById('themeBtn').textContent=n==='dark'?'🌙':'☀️'}
</script>
<button class="info-btn" onclick="showInfo()" title="معلومات الموقع">ℹ️</button>
<div class="info-modal" id="infoModal" onclick="closeInfo(event)">
  <div class="info-card" onclick="event.stopPropagation()">
    <h3>ℹ️ معلومات المطور</h3>
    <p><strong>المطور:</strong> Allaoui Ahmed Amine</p>
    <p><strong>البريد الإلكتروني:</strong> Allaoui.ahmedamine@gmail.com</p>
    <p><strong>البلد:</strong> بشار، الجزائر</p>
    <p class="muted">تم تطوير هذا الموقع لإدارة طلبات المنتجات الغذائية بالجملة</p>
    <button class="info-close" onclick="closeInfo()">إغلاق</button>
  </div>
</div>
<script>
function showInfo(){document.getElementById('infoModal').classList.add('show')}
function closeInfo(e){if(!e||e.target===e.currentTarget||!e)document.getElementById('infoModal').classList.remove('show')}
</script>
</body>
</html>
