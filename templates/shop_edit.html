<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تعديل محل - {{ shop_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:linear-gradient(rgba(11,14,20,0.82),rgba(26,31,46,0.88)),url('https://images.unsplash.com/photo-1768176136613-96a7bfc0049e?fm=jpg&q=60&w=1920');--card-bg:rgba(22,27,34,0.8);--card-border:rgba(255,255,255,0.04);--text:#fff;--text-muted:#8B949E;--accent:#58A6FF;--input-bg:rgba(13,17,23,0.8);--input-border:rgba(48,54,61,0.5);--shadow:0 25px 60px rgba(0,0,0,0.5)}
[data-theme="light"]{--bg:linear-gradient(rgba(255,255,255,0.88),rgba(240,244,248,0.92)),url('https://images.unsplash.com/photo-1768176136613-96a7bfc0049e?fm=jpg&q=60&w=1920');--card-bg:rgba(255,255,255,0.92);--card-border:rgba(0,0,0,0.06);--text:#1a1f2e;--text-muted:#57606a;--accent:#1F6FEB;--input-bg:rgba(255,255,255,0.9);--input-border:rgba(0,0,0,0.15);--shadow:0 25px 60px rgba(0,0,0,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);background-size:cover;background-position:center;background-attachment:fixed;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background 0.3s,color 0.3s}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:30px;width:420px;max-width:90%;transition:background 0.3s;position:relative}
.card h2{font-size:18px;font-weight:700;margin-bottom:20px;text-align:center;color:var(--accent)}
.theme-btn{position:absolute;top:12px;left:12px;background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:6px;border-radius:10px;transition:all 0.2s}
.theme-btn:hover{background:rgba(88,166,255,0.1);color:var(--accent)}
label{display:block;color:var(--text-muted);font-size:13px;margin-bottom:4px;margin-top:12px}
input{width:100%;padding:11px 14px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;box-sizing:border-box;transition:all 0.2s}
input:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:10px;margin-top:22px}
.btn-save{flex:1;padding:12px;background:linear-gradient(135deg,#238636,#2EA043);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-save:hover{transform:translateY(-1px)}
.btn-back{flex:1;padding:12px;background:rgba(48,54,61,0.5);border:none;border-radius:10px;color:var(--text-muted);font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;transition:all 0.2s}
.btn-back:hover{background:rgba(48,54,61,0.7)}
.code-display{background:var(--input-bg);padding:10px;border-radius:8px;text-align:center;font-family:monospace;color:var(--accent);font-size:18px;letter-spacing:3px;margin-top:4px}
</style>
</head>
<body>
<div class="card">
  <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="تغيير الثيم">🌙</button>
  <h2>✏️ تعديل {{ shop.name }}</h2>
  <form method="POST">
    <label>اسم المحل</label>
    <input type="text" name="name" value="{{ shop.name }}" required>
    <label>رقم الهاتف</label>
    <input type="text" name="phone" value="{{ shop.phone or '' }}">
    <label>العنوان</label>
    <input type="text" name="address" value="{{ shop.address or '' }}">
    <label>كود المحل (للإطلاع فقط)</label>
    <div class="code-display">{{ shop.code }}</div>
    <div class="btn-row">
      <a href="{{ url_for('manage_shops') }}" class="btn-back">رجوع</a>
      <button type="submit" class="btn-save">حفظ التعديلات</button>
    </div>
  </form>
</div>
<script>
(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️'})();
function toggleTheme(){var r=document.documentElement,n=r.getAttribute('data-theme')==='dark'?'light':'dark';r.setAttribute('data-theme',n);localStorage.setItem('theme',n);document.getElementById('themeBtn').textContent=n==='dark'?'🌙':'☀️'}
</script>
</body>
</html>
