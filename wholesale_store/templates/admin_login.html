<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>دخول المدير - {{ shop_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:linear-gradient(rgba(11,14,20,0.82),rgba(26,31,46,0.88)),url('https://images.unsplash.com/photo-1768176136613-96a7bfc0049e?fm=jpg&q=60&w=1920');--box-bg:rgba(22,27,34,0.95);--text:#fff;--text-muted:#8B949E;--accent:#58A6FF;--input-bg:rgba(13,17,23,0.8);--input-border:rgba(48,54,61,0.6);--border:rgba(255,255,255,0.06);--shadow:0 25px 60px rgba(0,0,0,0.5)}
[data-theme="light"]{--bg:linear-gradient(rgba(255,255,255,0.88),rgba(240,244,248,0.92)),url('https://images.unsplash.com/photo-1768176136613-96a7bfc0049e?fm=jpg&q=60&w=1920');--box-bg:rgba(255,255,255,0.95);--text:#1a1f2e;--text-muted:#57606a;--accent:#1F6FEB;--input-bg:rgba(255,255,255,0.9);--input-border:rgba(0,0,0,0.15);--border:rgba(0,0,0,0.06);--shadow:0 25px 60px rgba(0,0,0,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;min-height:100vh;background:var(--bg);background-size:cover;background-position:center;background-attachment:fixed;display:flex;align-items:center;justify-content:center;padding:20px;transition:background 0.3s}
.theme-btn{position:fixed;top:16px;left:16px;z-index:999;background:var(--box-bg);border:1px solid var(--border);color:var(--text-muted);font-size:20px;cursor:pointer;padding:8px 12px;border-radius:12px;transition:all 0.2s;backdrop-filter:blur(10px)}
.theme-btn:hover{background:var(--input-bg);color:var(--accent)}
.box{background:var(--box-bg);backdrop-filter:blur(20px);border-radius:28px;padding:45px 40px;width:400px;max-width:100%;border:1px solid var(--border);box-shadow:var(--shadow);text-align:center;transition:background 0.3s}
.logo{width:70px;height:70px;background:linear-gradient(135deg,#8957E5,#1F6FEB);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:28px;box-shadow:0 8px 25px rgba(137,87,229,0.3)}
h1{color:var(--text);font-size:22px;font-weight:900;margin-bottom:4px}
.tagline{color:var(--text-muted);font-size:13px;margin-bottom:25px}
.input-group{position:relative;margin-bottom:16px}
.input-group input{width:100%;padding:14px 18px;background:var(--input-bg);border:2px solid var(--input-border);border-radius:12px;color:var(--text);font-size:16px;transition:all 0.3s;font-family:'Cairo',sans-serif}
.input-group input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(88,166,255,0.1)}
.input-group label{position:absolute;top:-10px;right:15px;background:var(--box-bg);padding:0 8px;font-size:12px;color:var(--text-muted);font-weight:600}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#8957E5,#1F6FEB);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:0 4px 15px rgba(137,87,229,0.3)}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(137,87,229,0.4)}
.error{padding:12px 16px;background:rgba(218,54,51,0.15);border:1px solid rgba(218,54,51,0.3);border-radius:12px;color:#DA3633;font-size:14px;margin-bottom:16px}
.back-link{display:inline-block;margin-top:18px;color:var(--text-muted);text-decoration:none;font-size:13px;transition:all 0.2s}
.back-link:hover{color:var(--accent)}
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="تغيير الثيم">🌙</button>
<div class="box">
  <div class="logo">🔐</div>
  <h1>دخول المدير</h1>
  <p class="tagline">{{ shop_name }} — {{ shop_tagline }}</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="input-group">
      <label>اسم المستخدم</label>
      <input type="text" name="username" placeholder="admin" required>
    </div>
    <div class="input-group">
      <label>كلمة المرور</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-submit">دخول</button>
  </form>
  <a href="{{ url_for('shop_login') }}" class="back-link">← العودة لصفحة الطلب</a>
</div>
<script>
(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️'})();
function toggleTheme(){var r=document.documentElement,n=r.getAttribute('data-theme')==='dark'?'light':'dark';r.setAttribute('data-theme',n);localStorage.setItem('theme',n);document.getElementById('themeBtn').textContent=n==='dark'?'🌙':'☀️'}
</script>
</body>
</html>
