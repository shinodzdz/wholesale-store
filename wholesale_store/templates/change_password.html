<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تغيير كلمة المرور - {{ shop_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:linear-gradient(rgba(11,14,20,0.82),rgba(26,31,46,0.88)),url('https://images.unsplash.com/photo-1768176136613-96a7bfc0049e?fm=jpg&q=60&w=1920');--card-bg:rgba(22,27,34,0.8);--card-border:rgba(255,255,255,0.04);--text:#fff;--text-muted:#8B949E;--accent:#58A6FF;--input-bg:rgba(13,17,23,0.8);--input-border:rgba(48,54,61,0.5)}
[data-theme="light"]{--bg:linear-gradient(rgba(255,255,255,0.88),rgba(240,244,248,0.92)),url('https://images.unsplash.com/photo-1768176136613-96a7bfc0049e?fm=jpg&q=60&w=1920');--card-bg:rgba(255,255,255,0.92);--card-border:rgba(0,0,0,0.06);--text:#1a1f2e;--text-muted:#57606a;--accent:#1F6FEB;--input-bg:rgba(255,255,255,0.9);--input-border:rgba(0,0,0,0.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);background-size:cover;background-position:center;background-attachment:fixed;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;transition:background 0.3s}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:18px;padding:30px;width:400px;max-width:100%;transition:background 0.3s}
.card h2{font-size:18px;font-weight:700;margin-bottom:18px;text-align:center;color:var(--accent)}
label{display:block;color:var(--text-muted);font-size:13px;margin-bottom:4px;margin-top:12px}
input{width:100%;padding:11px 14px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Cairo',sans-serif;box-sizing:border-box}
input:focus{outline:none;border-color:var(--accent)}
.btn-row{display:flex;gap:10px;margin-top:20px}
.btn-save{flex:1;padding:12px;background:linear-gradient(135deg,#238636,#2EA043);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.btn-save:hover{transform:translateY(-1px)}
.btn-back{flex:1;padding:12px;background:rgba(48,54,61,0.5);border:none;border-radius:10px;color:var(--text-muted);font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center}
.btn-back:hover{background:rgba(48,54,61,0.7)}
.success{padding:10px 14px;background:rgba(35,134,54,0.15);border:1px solid rgba(35,134,54,0.3);border-radius:10px;color:#2EA043;font-size:13px;margin-bottom:12px;text-align:center}
.error{padding:10px 14px;background:rgba(218,54,51,0.15);border:1px solid rgba(218,54,51,0.3);border-radius:10px;color:#DA3633;font-size:13px;margin-bottom:12px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <h2>🔑 تغيير كلمة المرور</h2>
  {% if success %}<div class="success">{{ success }}</div>{% endif %}
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>كلمة المرور الحالية</label>
    <input type="password" name="current" required>
    <label>كلمة المرور الجديدة</label>
    <input type="password" name="new" required>
    <label>تأكيد كلمة المرور الجديدة</label>
    <input type="password" name="confirm" required>
    <div class="btn-row">
      <a href="{{ url_for('admin') }}" class="btn-back">رجوع</a>
      <button type="submit" class="btn-save">تغيير</button>
    </div>
  </form>
</div>
</body>
</html>
